# Nixpacks configuration for Railway deployment
# Install Chromium and chromedriver via Nix packages

[phases.setup]
nixPkgs = ['chromium', 'chromedriver']

[phases.install]
cmds = ['pip install -r requirements.txt', 'playwright install chromium --with-deps']

[start]
cmd = 'streamlit run main.py --server.port ${PORT:-8501} --server.address 0.0.0.0'
